# 订阅站模板：由 scripts/generate_clash_rules.py 自动生成。
# 说明：
# 1) `__PROXY_PROVIDERS__` 与 `__PROXY_NODES__` 由订阅站在渲染阶段替换。
# 2) 自定义规则顺序来自 custom_routing_rules，并按原 enabled 状态输出。
# 3) 末尾 MATCH 固定使用“漏网策略”组；该组默认首选代理，仍可在客户端切换直连/代理。
# 4) 当前模板档位：compat。
# 5) 当前 DNS 模式：redir-host。
# 6) 当前 DNS 上游：compat。
# 7) 如需补充内网 / 开发域名解析，可在同目录维护 template.local-dns-servers.txt / template.local-dns-domains.txt。

mixed-port: 7897
allow-lan: true
mode: rule
log-level: info
unified-delay: true
tcp-concurrent: true
find-process-mode: strict
global-client-fingerprint: chrome
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  sniff:
    TLS: {ports: [443, 8443]}
    HTTP: {ports: [80, 8080-8880], override-destination: true}
    QUIC: {ports: [443, 8443]}
external-controller: 127.0.0.1:9090
dns:
  enable: true
  ipv6: true
  respect-rules: true
  enhanced-mode: redir-host
  nameserver:
    - https://dns.cloudflare.com/dns-query
    - https://dns.google/dns-query
  proxy-server-nameserver:
    - 1.1.1.1
    - 8.8.8.8
  direct-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  direct-nameserver-follow-policy: true
  nameserver-policy:
    geosite:cn,private:
      - 223.5.5.5
      - 119.29.29.29
    "+.local":
      - 223.5.5.5
      - 119.29.29.29
    "+.localdomain":
      - 223.5.5.5
      - 119.29.29.29
    "+.lan":
      - 223.5.5.5
      - 119.29.29.29
    "+.home.arpa":
      - 223.5.5.5
      - 119.29.29.29
    "+.internal":
      - 223.5.5.5
      - 119.29.29.29
    "+.test":
      - 223.5.5.5
      - 119.29.29.29
    "host.docker.internal":
      - 223.5.5.5
      - 119.29.29.29
    "gateway.docker.internal":
      - 223.5.5.5
      - 119.29.29.29
    "+.docker.internal":
      - 223.5.5.5
      - 119.29.29.29
    "kubernetes.default.svc":
      - 223.5.5.5
      - 119.29.29.29
    "+.svc":
      - 223.5.5.5
      - 119.29.29.29
    "+.svc.cluster.local":
      - 223.5.5.5
      - 119.29.29.29
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
proxies: null
proxy-groups:
  - name: 🚀 手动选择
    type: select
    include-all: true
    include-all-proxies: true
    include-all-providers: true
    proxies:
      - ♻️ 自动选择
      - __PROXY_PROVIDERS__
      - __PROXY_NODES__
  - name: ♻️ 自动选择
    type: url-test
    include-all: true
    include-all-proxies: true
    include-all-providers: true
    proxies:
      - __PROXY_PROVIDERS__
      - __PROXY_NODES__
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
  - name: 🎯 全球直连
    type: select
    proxies:
      - DIRECT
  - name: ⛔ 强制阻断
    type: select
    proxies:
      - REJECT
      - DIRECT
  - name: 🐟 漏网策略
    type: select
    include-all: true
    include-all-proxies: true
    include-all-providers: true
    proxies:
      - 🚀 手动选择
      - ♻️ 自动选择
      - 🎯 全球直连
      - __PROXY_PROVIDERS__
      - __PROXY_NODES__
rules:
  # 01 Crack_拦截
  - RULE-SET,custom-01-crack-block,⛔ 强制阻断
  # 02 BT_直连
  - RULE-SET,custom-02-bt-direct,🎯 全球直连
  # 03 IP_代理
  - RULE-SET,custom-03-ip-proxy,🚀 手动选择
  # 04 IP_直连
  - RULE-SET,custom-04-ip-direct,🎯 全球直连
  # 05 Steam_代理
  - RULE-SET,custom-05-steam-proxy,🚀 手动选择
  # 06 Steam_直连
  - RULE-SET,custom-06-steam-direct,🎯 全球直连
  # 07 域名_直连
  - RULE-SET,custom-07-domain-direct,🎯 全球直连
  # 08 域名_代理
  - RULE-SET,custom-08-domain-proxy,🚀 手动选择
  # 09 广告_类别_拦截
  # 原规则 enabled=false，默认保持禁用。
  # - RULE-SET,custom-09-ads-category-block,⛔ 强制阻断
  # 10 域名_类别_直连
  - RULE-SET,custom-10-domain-category-direct,🎯 全球直连
  # 11 域名_区域_直连
  - RULE-SET,custom-11-domain-region-direct,🎯 全球直连
  # 12 IP_区域_直连
  - RULE-SET,custom-12-ip-region-direct,🎯 全球直连
  # 13 域名_类别_代理
  - RULE-SET,custom-13-domain-category-proxy,🚀 手动选择
  # 14 IP_类别_代理
  - RULE-SET,custom-14-ip-category-proxy,🚀 手动选择
  # 15 域名_区域_代理
  - RULE-SET,custom-15-domain-region-proxy,🚀 手动选择
  # 16 端口_全部_直连
  # 全端口/全流量兜底规则已折叠为 MATCH,🐟 漏网策略；该组默认首选代理，可在客户端切回直连。
  - MATCH,🐟 漏网策略
