# 订阅站模板：由 scripts/generate_clash_rules.py 自动生成。
# 说明：
# 1) `__PROXY_PROVIDERS__` 与 `__PROXY_NODES__` 由订阅站在渲染阶段替换。
# 2) 自定义规则顺序来自 custom_routing_rules，并按原 enabled 状态输出。
# 3) 末尾 MATCH 固定使用“漏网策略”组，方便在客户端一键切换直连/代理。
# 4) 当前模板档位：compat。

mixed-port: 7897
allow-lan: true
mode: rule
log-level: info
unified-delay: true
tcp-concurrent: true
find-process-mode: strict
global-client-fingerprint: chrome
external-controller: 127.0.0.1:9090
dns:
  enable: true
  ipv6: true
  respect-rules: true
  enhanced-mode: fake-ip
  nameserver:
    - https://120.53.53.53/dns-query
    - https://223.5.5.5/dns-query
  proxy-server-nameserver:
    - https://120.53.53.53/dns-query
    - https://223.5.5.5/dns-query
  nameserver-policy:
    geosite:cn,private:
      - https://120.53.53.53/dns-query
      - https://223.5.5.5/dns-query
    geosite:geolocation-!cn:
      - https://dns.cloudflare.com/dns-query
      - https://dns.google/dns-query
  fake-ip-filter:
    - "localhost"
    - "*.localhost"
    - "*.local"
    - "*.localdomain"
    - "*.lan"
    - "*.home.arpa"
    - "*.internal"
    - "*.test"
    - "host.docker.internal"
    - "gateway.docker.internal"
    - "*.docker.internal"
    - "kubernetes.default.svc"
    - "*.svc"
    - "*.svc.cluster.local"
    - "*.in-addr.arpa"
    - "*.ip6.arpa"
    - "wpad"
    - "stun.*.*.*"
    - "stun.*.*"
    - "*.*.*.srv.nintendo.net"
    - "*.*.stun.playstation.net"
    - "*.*.xboxlive.com"
    - "xbox.*.*.microsoft.com"
    - "speedtest.cros.wr.pvp.net"
    - "pool.ntp.org"
    - "*.ntp.org"
    - "*.ntp.org.cn"
    - "*.openwrt.pool.ntp.org"
    - "ntp.aliyun.com"
    - "ntp.ubuntu.com"
    - "ntp1.aliyun.com"
    - "ntp2.aliyun.com"
    - "ntp3.aliyun.com"
    - "ntp4.aliyun.com"
    - "ntp5.aliyun.com"
    - "ntp6.aliyun.com"
    - "ntp7.aliyun.com"
    - "time.windows.com"
    - "time.nist.gov"
    - "time.ustc.edu.cn"
    - "time1.cloud.tencent.com"
    - "time.apple.com"
    - "time.asia.apple.com"
    - "time1.apple.com"
    - "time2.apple.com"
    - "time3.apple.com"
    - "time4.apple.com"
    - "time5.apple.com"
    - "time6.apple.com"
    - "time7.apple.com"
    - "*.time.apple.com"
    - "time1.aliyun.com"
    - "time2.aliyun.com"
    - "time3.aliyun.com"
    - "time4.aliyun.com"
    - "time5.aliyun.com"
    - "time6.aliyun.com"
    - "time7.aliyun.com"
    - "time.google.com"
    - "time1.google.com"
    - "time2.google.com"
    - "time3.google.com"
    - "time4.google.com"
    - "*.time.google.com"
    - "*.time.edu.cn"
    - "*.ipv6.microsoft.com"
    - "*.msftconnecttest.com"
    - "*.msftncsi.com"
proxies: null
proxy-groups:
  - name: 🚀 手动选择
    type: select
    include-all: true
    include-all-proxies: true
    include-all-providers: true
    proxies:
      - ♻️ 自动选择
      - __PROXY_PROVIDERS__
      - __PROXY_NODES__
  - name: ♻️ 自动选择
    type: url-test
    include-all: true
    include-all-proxies: true
    include-all-providers: true
    proxies:
      - __PROXY_PROVIDERS__
      - __PROXY_NODES__
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 50
  - name: 🎯 全球直连
    type: select
    proxies:
      - DIRECT
  - name: ⛔ 强制阻断
    type: select
    proxies:
      - REJECT
      - DIRECT
  - name: 🐟 漏网策略
    type: select
    include-all: true
    include-all-proxies: true
    include-all-providers: true
    proxies:
      - 🎯 全球直连
      - 🚀 手动选择
      - ♻️ 自动选择
      - __PROXY_PROVIDERS__
      - __PROXY_NODES__
rules:
  # 01 Crack_拦截
  - RULE-SET,custom-01-crack-block,⛔ 强制阻断
  # 02 BT_直连
  - RULE-SET,custom-02-bt-direct,🎯 全球直连
  # 03 IP_代理
  - RULE-SET,custom-03-ip-proxy,🚀 手动选择
  # 04 IP_直连
  - RULE-SET,custom-04-ip-direct,🎯 全球直连
  # 05 Steam_代理
  - RULE-SET,custom-05-steam-proxy,🚀 手动选择
  # 06 Steam_直连
  - RULE-SET,custom-06-steam-direct,🎯 全球直连
  # 07 域名_直连
  - RULE-SET,custom-07-domain-direct,🎯 全球直连
  # 08 域名_代理
  - RULE-SET,custom-08-domain-proxy,🚀 手动选择
  # 09 广告_类别_拦截
  # 原规则 enabled=false，默认保持禁用。
  # - RULE-SET,custom-09-ads-category-block,⛔ 强制阻断
  # 10 域名_类别_直连
  - RULE-SET,custom-10-domain-category-direct,🎯 全球直连
  # 11 域名_区域_直连
  - RULE-SET,custom-11-domain-region-direct,🎯 全球直连
  # 12 IP_区域_直连
  - RULE-SET,custom-12-ip-region-direct,🎯 全球直连
  # 13 域名_类别_代理
  - RULE-SET,custom-13-domain-category-proxy,🚀 手动选择
  # 14 IP_类别_代理
  - RULE-SET,custom-14-ip-category-proxy,🚀 手动选择
  # 15 域名_区域_代理
  - RULE-SET,custom-15-domain-region-proxy,🚀 手动选择
  # 16 端口_全部_直连
  - MATCH,🐟 漏网策略
