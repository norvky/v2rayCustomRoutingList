# 包含“自定义规则 + 默认策略组”的主片段，不含节点与订阅配置。
# 本文件由 scripts/generate_clash_rules.py 自动生成。
# 说明：
# 1) 该文件中的分组命名与订阅站模板保持一致。
# 2) `🚀 手动选择`/`♻️ 自动选择` 默认是可启动兜底，接入时请替换为你的真实代理入口。

proxy-groups:
  - name: 🚀 手动选择
    type: select
    proxies:
      - ♻️ 自动选择
      - 🎯 全球直连
  - name: ♻️ 自动选择
    type: select
    proxies:
      - 🎯 全球直连
  - name: 🎯 全球直连
    type: select
    proxies:
      - DIRECT
  - name: ⛔ 强制阻断
    type: select
    proxies:
      - REJECT
      - DIRECT
  - name: 🐟 漏网策略
    type: select
    proxies:
      - 🚀 手动选择
      - ♻️ 自动选择
      - 🎯 全球直连

